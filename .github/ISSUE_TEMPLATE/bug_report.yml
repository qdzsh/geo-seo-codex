name: Bug report
description: Report an installer, CLI, or skill behavior bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, private audit reports, or proprietary client data.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `cat VERSION` or release tag.
      placeholder: "v0.3.1"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Command that failed.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Paste `$geo doctor` or `geo_cli.py doctor` output if available.
      render: text
