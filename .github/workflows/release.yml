name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release archive
        run: |
          mkdir -p dist
          git archive --format=zip --output "dist/geo-seo-codex.zip" HEAD
          sha256sum "dist/geo-seo-codex.zip" > "dist/geo-seo-codex.zip.sha256"
          cp "dist/geo-seo-codex.zip" "dist/geo-seo-codex-${GITHUB_REF_NAME}.zip"
          cp "dist/geo-seo-codex.zip.sha256" "dist/geo-seo-codex-${GITHUB_REF_NAME}.zip.sha256"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "GEO-SEO Codex ${GITHUB_REF_NAME}" \
            --notes-file CHANGELOG.md
