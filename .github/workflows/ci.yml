name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: verify (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile Python
        shell: python
        run: |
          import py_compile

          files = [
              "scripts/geo_cli.py",
              "scripts/fetch_page.py",
              "scripts/citability_scorer.py",
              "scripts/llmstxt_generator.py",
              "scripts/brand_scanner.py",
              "scripts/generate_pdf_report.py",
              "scripts/crm_dashboard.py",
              "scripts/webapp/app.py",
              "geo_seo/__init__.py",
              "geo_seo/__main__.py",
              "tests/test_geo_cli.py",
          ]
          for file in files:
              py_compile.compile(file, doraise=True)
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Check shell installer syntax
        if: runner.os != 'Windows'
        run: bash -n install.sh
      - name: Check PowerShell installer syntax
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile("install.ps1", [ref]$tokens, [ref]$errors)
          if ($errors.Count -gt 0) { $errors | ForEach-Object { Write-Error $_ }; exit 1 }
      - name: Check legacy references
        shell: python
        run: |
          from pathlib import Path
          import re
          legacy_terms = [
              "geo-seo-" + "claude",
              "Claude " + "Code",
              "~/.cl" + "aude",
              "anthropic-ai/" + "claude-code",
              "Web" + "Fetch",
              "allowed-" + "tools",
              "GEO-SEO " + "Claude",
          ]
          pattern = re.compile("|".join(re.escape(term) for term in legacy_terms))
          ignored = {".git", ".venv", "build", "dist", "geo_seo_codex.egg-info", "__pycache__"}
          hits = []
          for path in Path(".").rglob("*"):
              if any(part in ignored for part in path.parts) or not path.is_file():
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for line_no, line in enumerate(text.splitlines(), start=1):
                  if pattern.search(line):
                      hits.append(f"{path}:{line_no}:{line}")
          if hits:
              print("\n".join(hits))
              raise SystemExit(1)
      - name: CLI smoke tests
        run: |
          python scripts/geo_cli.py --help
          python -m geo_seo --help
          python -m pip install . --quiet
          geo-seo --help
          python scripts/geo_cli.py doctor
